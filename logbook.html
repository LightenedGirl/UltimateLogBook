<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2E3336">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Logbook</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --overdue:#D6534A;
    --soon:#E0A030;
    --star:#E0A030;
    --ink:#2E3336;
    --muted:#8B9296;
    --line:#E7E4DD;
    --white:#FFFFFF;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:transparent;}
  body{font-family:'Inter',sans-serif; color:var(--ink); -webkit-font-smoothing:antialiased;}

  .app{max-width:640px; margin:0 auto; padding:20px 16px 80px; min-height:100vh; background:var(--white); transition:background .25s ease;}
  @media (max-width:480px){
    .app{padding:14px 10px 70px;}
    .headbtns{gap:5px;}
    .navbtn{padding:6px 8px; font-size:10.5px;}
    .profile-btn{padding:6px 9px; font-size:12px;}
    .brand{font-size:19px;}
  }

  .lockscreen{
    position:fixed; inset:0; background:var(--white); display:flex; align-items:center; justify-content:center;
    z-index:100; padding:20px;
  }
  .lockscreen.hidden{display:none;}
  .lockbox{width:100%; max-width:300px; text-align:center;}
  .lock-icon{color:var(--ink); margin-bottom:10px;}
  .lock-icon svg{width:34px; height:34px;}
  .lock-title{font-family:'Quicksand',sans-serif; font-weight:700; font-size:20px; margin-bottom:2px;}
  .lock-sub{font-size:12.5px; color:var(--muted); margin-bottom:16px;}
  .lock-input{
    width:100%; border:1px solid var(--line); border-radius:10px; padding:11px 13px; font-size:15px;
    font-family:'Inter',sans-serif; margin-bottom:10px; text-align:center;
  }
  .lock-input:focus{outline:1.5px solid var(--ink);}
  .lock-error{color:var(--overdue); font-size:12px; font-weight:600; min-height:16px; margin-bottom:6px;}
  .lock-btn{
    width:100%; padding:11px; border-radius:10px; border:none; background:var(--ink); color:var(--white);
    font-family:'Inter',sans-serif; font-weight:600; font-size:14px; cursor:pointer; margin-top:4px;
  }
  .lock-forgot{margin-top:14px; font-size:11.5px; color:var(--muted);}
  .lock-forgot span{color:var(--overdue); text-decoration:underline; cursor:pointer;}

  header{display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:14px; flex-wrap:wrap; position:relative;}
  .brand{font-family:'Quicksand',sans-serif; font-weight:700; font-size:22px;}
  .headbtns{display:flex; gap:6px; align-items:center; flex-wrap:wrap;}
  .navbtn{
    font-family:'Inter',sans-serif; font-size:11.5px; font-weight:600; padding:7px 10px;
    border-radius:20px; border:1px solid var(--line); background:var(--white); color:var(--muted); cursor:pointer;
    display:flex; align-items:center; gap:4px;
  }
  .navbtn svg{width:13px;height:13px;}
  .navbtn.active{background:var(--ink); color:var(--white); border-color:var(--ink);}

  .profile-select{position:static;}
  .profile-btn{
    display:flex; align-items:center; gap:7px; padding:7px 11px; border-radius:20px;
    border:1px solid var(--line); background:var(--white); cursor:pointer;
    font-family:'Quicksand',sans-serif; font-weight:600; font-size:13.5px;
  }
  .profile-btn .ic{width:17px; height:17px; display:flex; align-items:center;}
  .profile-menu{
    position:absolute; top:100%; right:0; background:var(--white); border:1px solid var(--line);
    border-radius:12px; box-shadow:0 8px 24px rgba(0,0,0,0.1); overflow:hidden; z-index:30;
    width:220px; max-width:calc(100vw - 32px); display:none;
    max-height:340px; overflow-y:auto;
  }
  .profile-menu.open{display:block;}
  .profile-item{display:flex; align-items:center; gap:10px; padding:10px 12px; cursor:pointer; font-size:13.5px; font-weight:500;}
  .profile-item:hover{background:#F7F6F3;}
  .profile-item .ic{width:19px; height:19px; flex-shrink:0;}
  .profile-item .pname{flex:1;}
  .profile-item .delx{color:#C7C4BC; font-size:15px; padding:0 2px;}
  .profile-item .delx:hover{color:var(--overdue);}
  .menu-sep{border-top:1px solid var(--line); margin:4px 0;}
  .menu-title{font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.6px; color:var(--muted); padding:10px 12px 4px;}
  .menu-empty{font-size:12px; color:var(--muted); padding:4px 12px 8px;}
  .menu-add{display:flex; align-items:center; gap:8px; padding:10px 12px; cursor:pointer; font-size:13px; font-weight:600; color:var(--ink);}
  .menu-add:hover{background:#F7F6F3;}
  .menu-add svg{width:16px;height:16px;}

  .profile-banner{display:flex; align-items:center; gap:10px; padding:13px 15px; border-radius:14px; margin-bottom:14px;}
  .profile-banner .ic{width:24px; height:24px;}
  .profile-banner .name{font-family:'Quicksand',sans-serif; font-weight:700; font-size:16.5px;}
  .profile-banner .count{font-size:12px; color:var(--muted); margin-left:auto;}

  .empty{text-align:center; padding:44px 20px; color:var(--muted); font-family:'Quicksand',sans-serif; font-size:15px; font-weight:600; border:1.5px dashed var(--line); border-radius:14px;}
  .empty small{display:block; font-family:'Inter',sans-serif; font-weight:400; font-size:12.5px; margin-top:6px;}

  .task{border-radius:12px; margin-bottom:8px; background:var(--white); border:1px solid var(--line);}
  .task-row{display:flex; align-items:flex-start; gap:9px; padding:11px 11px;}
  .task-row.done .task-title{text-decoration:line-through; color:var(--muted);}
  .checkbox{width:19px; height:19px; border-radius:6px; border:2px solid var(--line); flex-shrink:0; cursor:pointer; display:flex; align-items:center; justify-content:center; margin-top:1px; background:var(--white);}
  .checkbox.checked{background:var(--ink); border-color:var(--ink);}
  .checkbox.checked svg{width:11px; height:11px; stroke:white;}

  .task-main{flex:1; min-width:0;}
  .task-title-row{display:flex; align-items:center; gap:5px; flex-wrap:wrap;}
  .task-title{font-family:'Inter',sans-serif; font-weight:600; font-size:14px; word-break:break-word;}
  .typetag{display:inline-flex; width:13px; height:13px; flex-shrink:0; opacity:0.65; vertical-align:middle;}
  .typetag svg{width:100%; height:100%;}
  .star-btn{background:none; border:none; cursor:pointer; padding:0; display:flex; flex-shrink:0;}
  .star-btn svg{width:14px; height:14px;}

  .meta-row{display:flex; align-items:center; gap:6px; margin-top:5px; flex-wrap:wrap;}
  .badge{font-size:10.5px; font-weight:700; padding:3px 7px; border-radius:10px; background:#F1F0EC; color:var(--muted);}
  .badge.overdue{background:#FBE8E6; color:var(--overdue);}
  .badge.soon{background:#FCF0DC; color:#B87A1E;}
  .badge.shop{background:#EAF3FC; color:#3B6FA0;}
  .badge.med{background:#F3EAFC; color:#7A47B0;}
  .badge.bday{background:#FCEAF1; color:#B5477D;}
  .caret-btn{background:none;border:none;cursor:pointer;padding:2px;color:var(--muted); flex-shrink:0;}
  .caret-btn svg{width:15px;height:15px; transition:transform .15s;}
  .caret-btn.open svg{transform:rotate(90deg);}

  .row-actions{display:flex; gap:4px; align-items:center; flex-shrink:0;}
  .iconbtn{background:none; border:none; cursor:pointer; color:var(--muted); padding:4px; display:flex; border-radius:6px;}
  .iconbtn:hover{background:#F1F0EC; color:var(--ink);}
  .iconbtn svg{width:15px; height:15px;}

  .children{padding:0 8px 8px 26px;}
  .children .task{margin-bottom:6px;}

  .subadd{padding:8px 10px 10px 26px;}

  .form{background:#FAF9F6; border:1px solid var(--line); border-radius:12px; padding:12px; margin-top:6px;}
  .form-row{margin-bottom:10px;}
  .form-row label{display:block; font-size:10.5px; font-weight:600; color:var(--muted); margin-bottom:4px; text-transform:uppercase; letter-spacing:0.4px;}
  .form-row input[type=text], .form-row input[type=date], .form-row input[type=number], .form-row select{
    width:100%; border:1px solid var(--line); border-radius:8px; padding:8px 10px;
    font-family:'Inter',sans-serif; font-size:13.5px; background:var(--white); color:var(--ink);
  }
  .form-row input:focus, .form-row select:focus{outline:1.5px solid var(--ink);}
  .form-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .form-grid3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;}
  .typepicker{display:flex; gap:5px;}
  .typebtn{
    flex:1; padding:7px 2px; border-radius:8px; border:1px solid var(--line); background:var(--white);
    cursor:pointer; font-size:10.5px; font-weight:600; color:var(--muted); display:flex; flex-direction:column;
    align-items:center; gap:3px;
  }
  .typebtn svg{width:16px;height:16px;}
  .typebtn.sel{background:var(--ink); color:var(--white); border-color:var(--ink);}
  .checkline{display:flex; align-items:center; gap:8px; font-size:13px; font-weight:500;}
  .daychips{display:flex; flex-wrap:wrap; gap:6px;}
  .daychip{
    padding:7px 10px; border-radius:8px; border:1px solid var(--line); background:var(--white);
    cursor:pointer; font-size:12.5px; font-weight:600; color:var(--muted);
  }
  .daychip.sel{background:var(--ink); border-color:var(--ink); color:var(--white);}
  .monthgrid{display:grid; grid-template-columns:repeat(7,1fr); gap:5px;}
  .daychip.small{padding:6px 0; font-size:11.5px; text-align:center;}
  .checkline input{width:15px; height:15px;}
  .form-actions{display:flex; gap:8px; margin-top:12px;}
  .btn{flex:1; padding:9px; border-radius:8px; border:1px solid var(--line); font-family:'Inter',sans-serif; font-size:13px; font-weight:600; cursor:pointer; background:var(--white); color:var(--muted);}
  .btn.primary{background:var(--ink); border-color:var(--ink); color:var(--white);}
  .subfields{border-top:1px dashed var(--line); margin-top:2px; padding-top:10px;}

  .top-add{margin-top:6px; margin-bottom:16px;}
  .top-addbtn{width:100%; padding:11px; border-radius:12px; border:1.5px dashed var(--line); background:transparent; cursor:pointer; font-family:'Quicksand',sans-serif; font-weight:600; font-size:13.5px; color:var(--muted);}
  .top-addbtn:hover{color:var(--ink); border-color:var(--ink);}

  .tabs-row{display:flex; gap:6px; margin-bottom:16px;}
  .tab2{
    font-size:11.5px; font-weight:600; padding:7px 12px; border-radius:16px;
    border:1px solid var(--line); background:var(--white); color:var(--muted); cursor:pointer;
  }
  .tab2.sel{background:var(--ink); color:var(--white); border-color:var(--ink);}
  .report-group{margin-bottom:18px;}
  .report-head{display:flex; align-items:center; gap:8px; margin-bottom:8px; padding-bottom:6px; border-bottom:2px solid var(--line);}
  .report-head .ic{width:18px; height:18px;}
  .report-head .name{font-family:'Quicksand',sans-serif; font-weight:700; font-size:14px; padding:4px 10px; border-radius:20px;}
  .report-head .rtotal{margin-left:auto; font-size:11.5px; color:var(--muted); font-weight:600;}
  .report-item{display:flex; align-items:center; gap:10px; padding:9px 4px 9px 16px; border-bottom:1px solid #F1F0EC;}
  .report-item:last-child{border-bottom:none;}
  .report-item .path{font-size:10.5px; color:var(--muted);}
  .report-item .rtitle{font-size:13px; font-weight:600;}
  .report-item .rmain{flex:1; min-width:0;}
  .report-empty{color:var(--muted); font-size:12.5px; padding:6px 4px;}

  .modal-backdrop{position:fixed; inset:0; background:rgba(0,0,0,0.35); display:flex; align-items:center; justify-content:center; z-index:50; padding:20px;}
  .modal{background:var(--white); border-radius:16px; padding:18px; width:100%; max-width:380px; max-height:86vh; overflow-y:auto;}
  .modal h3{font-family:'Quicksand',sans-serif; margin:0 0 12px; font-size:17px;}
  .swatchrow{display:flex; flex-wrap:wrap; gap:8px;}
  .swatch{width:30px; height:30px; border-radius:8px; cursor:pointer; border:2px solid transparent;}
  .swatch.sel{border-color:var(--ink);}
  .iconrow{display:flex; flex-wrap:wrap; gap:8px;}
  .iconchoice{width:38px; height:38px; border-radius:9px; border:1.5px solid var(--line); background:var(--white); cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--muted);}
  .iconchoice svg{width:19px;height:19px;}
  .iconchoice.sel{border-color:var(--ink); color:var(--ink); background:#F7F6F3;}

  .loading{text-align:center; padding:60px 20px; color:var(--muted); font-family:'Inter',sans-serif; font-size:13px;}
  ::selection{background:#E7E4DD;}
</style>
</head>
<body>
<div class="lockscreen" id="lockscreen">
  <div class="lockbox">
    <div class="lock-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="4.5" y="10.5" width="15" height="10" rx="2"/><path d="M8 10.5V7a4 4 0 018 0v3.5"/></svg>
    </div>
    <div class="lock-title" id="lockTitle">Logbook</div>
    <div class="lock-sub" id="lockSub">Enter your password</div>
    <input type="password" id="lockInput" class="lock-input" placeholder="Password" autocomplete="off">
    <input type="password" id="lockInput2" class="lock-input" placeholder="Confirm password" style="display:none;" autocomplete="off">
    <div class="lock-error" id="lockError"></div>
    <button class="lock-btn" id="lockSubmit">Unlock</button>
    <div class="lock-forgot" id="lockForgot">Forgot password? <span data-action="lock-reset">Reset app</span></div>
  </div>
</div>

<div class="app" id="app" style="display:none;">
  <header>
    <div class="brand">Logbook</div>
    <div class="headbtns">
      <button class="navbtn" id="reportBtn">Report</button>
      <button class="navbtn" id="shopBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4h2l2.4 12.4a2 2 0 002 1.6h8.4a2 2 0 002-1.8L21 8H6"/><circle cx="9.5" cy="20" r="1.3"/><circle cx="17" cy="20" r="1.3"/></svg>
        Shopping
      </button>
      <button class="navbtn" id="bdayBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20v-6.5a2 2 0 012-2h12a2 2 0 012 2V20"/><path d="M4 20h16"/><path d="M4 16.5c1 .8 2 .8 3 0s2-.8 3 0 2 .8 3 0 2-.8 3 0 2 .8 3 0"/></svg>
        Birthdays
      </button>
      <button class="navbtn" id="exportBtn" title="Export backup">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M7 10l5 5 5-5"/><path d="M5 19h14"/></svg>
      </button>
      <button class="navbtn" id="importBtn" title="Import backup">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V3M7 8l5-5 5 5"/><path d="M5 19h14"/></svg>
      </button>
      <button class="navbtn" id="lockBtn" title="Lock app">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4.5" y="10.5" width="15" height="10" rx="2"/><path d="M8 10.5V7a4 4 0 018 0v3.5"/></svg>
      </button>
      <input type="file" id="importFile" accept="application/json" style="display:none;">
      <div class="profile-select">
        <button class="profile-btn" id="profileBtn"></button>
        <div class="profile-menu" id="profileMenu"></div>
      </div>
    </div>
  </header>

  <div id="content"><div class="loading">Opening the logbook…</div></div>
</div>

<script>

  var ICONS = {
    home: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3.5 11.5L12 4l8.5 7.5"/><path d="M5.5 10v9a1 1 0 001 1h11a1 1 0 001-1v-9"/><path d="M9.5 20v-6h5v6"/></svg>',

    dumbbell: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 8.5v7M4 10v4M17.5 8.5v7M20 10v4M8.5 12h7"/></svg>',
    gift: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="9" width="16" height="11" rx="1.5"/><path d="M4 13h16"/><path d="M12 9v11"/><path d="M8.5 9C6 9 6 5.5 8.5 5.5S12 8 12 9c0-1 1.5-3.5 3.5-3.5S18 9 15.5 9"/></svg>',
    plane: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M10.5 21l1.5-4 1.5 4h-3z"/><path d="M12 3l8 6-2.5 1.5L12 8l-5.5 2.5L4 9z"/><path d="M12 8v8"/></svg>',
    calendar: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="5.5" width="16" height="15" rx="1.8"/><path d="M4 10h16"/><path d="M8 3.5v3M16 3.5v3"/></svg>',
    list: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6h12M8 12h12M8 18h12"/><circle cx="4" cy="6" r="1"/><circle cx="4" cy="12" r="1"/><circle cx="4" cy="18" r="1"/></svg>',
    cart: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4h2l2.4 12.4a2 2 0 002 1.6h8.4a2 2 0 002-1.8L21 8H6"/><circle cx="9.5" cy="20" r="1.3"/><circle cx="17" cy="20" r="1.3"/></svg>',

  function daysUntil(dateStr){
    if(!dateStr) return null;
    var parts = dateStr.split('-').map(Number);
    var due = new Date(parts[0], parts[1]-1, parts[2]);

  function load(){
    if(storageOK){

  function persist(){

  function depthOf(task){
    var d=0, t=task, guard=0;
    while(t && t.parentId && guard<10){
      d++;

      guard++;

    return d;
  }

  function isEffectivelyDone(t){
    if(t.type==='task' && t.recurMode && t.recurMode!=='duedate') return taskDueInfo(t).done;
    return !!t.done;

  function toggleDone(id){
    var t=state.tasks.find(function(x){return x.id===id;});
    if(!t) return;
    if(t.type==='task' && t.recurMode && t.recurMode!=='duedate'){
      var occStr = occurrenceDateStr(t);
      t.recurCompletions = t.recurCompletions || {};
      t.recurCompletions[occStr] = !t.recurCompletions[occStr];
    } else {
      t.done = !t.done;
    }

  }
  function toggleImportant(id){ var t=state.tasks.find(function(x){return x.id===id;}); if(t){ t.important=!t.important; save(); } }
  function deleteTask(id){
    var toDelete=[id], changed=true;
    while(changed){
      changed=false;
      state.tasks.forEach(function(t){
        if(t.parentId && toDelete.indexOf(t.parentId)!==-1 && toDelete.indexOf(t.id)===-1){ toDelete.push(t.id); changed=true; }
      });
    }
    state.tasks = state.tasks.filter(function(t){ return toDelete.indexOf(t.id)===-1; });
    save();
  }

  function dueBadge(dateStr, isDone){
    if(!dateStr) return '';
    var d = daysUntil(dateStr);
    var cls='', text='';
    if(!isDone && d<0){ cls='overdue'; text='Missed'; }
    else if(d===0){ cls='soon'; text='Due today'; }
    else if(d>0 && d<=2){ cls='soon'; text=d+' day'+(d===1?'':'s')+' left'; }
    else if(d>2){ text=d+' days left'; }
    else { text = Math.abs(d)+'d ago'; }
    return '<span class="badge '+cls+'">'+text+'</span>';
  }

  function fmtDate(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }

  function weekdaysOf(t){ return (t.recurWeekdays && t.recurWeekdays.length) ? t.recurWeekdays : (t.recurWeekday!=null ? [t.recurWeekday] : [1]); }
  function monthDaysOf(t){ return (t.recurMonthDays && t.recurMonthDays.length) ? t.recurMonthDays : (t.recurMonthDay!=null ? [t.recurMonthDay] : [1]); }

  function activeWeeklyOcc(weekdays, today, completions){
    completions = completions || {};
    var todayDow = today.getDay();
    var pastOrToday=null, future=null;
    weekdays.forEach(function(wd){
      var diff = wd - todayDow;
      var d = new Date(today.getFullYear(), today.getMonth(), today.getDate()+diff);
      if(diff<=0){ if(!pastOrToday || d>pastOrToday) pastOrToday=d; }
      else { if(!future || d<future) future=d; }
    });
    if(pastOrToday){
      var pStr = fmtDate(pastOrToday);
      if(!completions[pStr]) return pStr;
    }
    if(!future){
      var minWd = Math.min.apply(null, weekdays);
      var diff2 = (7-todayDow)+minWd;
      future = new Date(today.getFullYear(), today.getMonth(), today.getDate()+diff2);
    }
    return fmtDate(future);
  }

  function activeMonthlyOcc(mdays, today, completions){
    completions = completions || {};
    var y=today.getFullYear(), m=today.getMonth();
    var dim = new Date(y, m+1, 0).getDate();
    var clamped = mdays.map(function(d){ return Math.min(d,dim); });
    var todayDate = today.getDate();
    var pastOrToday=null, future=null;
    clamped.forEach(function(day){
      var d = new Date(y,m,day);
      if(day<=todayDate){ if(!pastOrToday || d>pastOrToday) pastOrToday=d; }
      else { if(!future || d<future) future=d; }
    });
    if(pastOrToday){
      var pStr = fmtDate(pastOrToday);
      if(!completions[pStr]) return pStr;
    }
    if(!future){
      var minDay = Math.min.apply(null, mdays);
      var ny=y, nm=m+1; if(nm>11){ nm=0; ny++; }
      var dim2 = new Date(ny, nm+1, 0).getDate();
      future = new Date(ny, nm, Math.min(minDay, dim2));
    }
    return fmtDate(future);
  }

  function occurrenceDateStr(t, ref){
    ref = ref || new Date();
    var today = dateOnly(ref);
    if(!t.recurMode || t.recurMode==='duedate') return t.dueDate;
    if(t.recurMode==='daily') return fmtDate(today);
    if(t.recurMode==='weekly') return activeWeeklyOcc(weekdaysOf(t), today, t.recurCompletions);
    if(t.recurMode==='monthly') return activeMonthlyOcc(monthDaysOf(t), today, t.recurCompletions);
    return t.dueDate;
  }

  function taskDueInfo(t){
    var occStr = occurrenceDateStr(t);
    var isRecurring = !!(t.recurMode && t.recurMode!=='duedate');
    var done = isRecurring ? !!(t.recurCompletions && t.recurCompletions[occStr]) : !!t.done;
    var days = occStr ? daysUntil(occStr) : null;
    var missed = !done && days!==null && days<0;
    return { occStr:occStr, done:done, days:days, missed:missed, recurring:isRecurring };
  }

  function ordinal(n){
    var s = ['th','st','nd','rd'], v = n%100;
    return n + (s[(v-20)%10] || s[v] || s[0]);
  }

  function taskFreqLabel(t){
    if(!t.recurMode || t.recurMode==='duedate') return '';
    if(t.recurMode==='daily') return 'Daily';
    if(t.recurMode==='weekly'){
      var days = weekdaysOf(t).slice().sort().map(function(d){ return DOW[d]; });
      return 'Weekly \u00b7 '+days.join(', ');
    }
    if(t.recurMode==='monthly'){
      var mdays = monthDaysOf(t).slice().sort(function(a,b){return a-b;}).map(ordinal);
      return 'Monthly \u00b7 '+mdays.join(', ');
    }
    return '';
  }

  function taskBadgesHtml(t){
    var info = taskDueInfo(t);
    var html = '';
    if(!info.occStr) return html;
    if(info.missed) html += '<span class="badge overdue">Missed</span>';
    else html += dueBadge(info.occStr, info.done);
    var freqLabel = taskFreqLabel(t);
    if(freqLabel) html += '<span class="badge">'+freqLabel+'</span>';
    return html;
  }

  function medLabel(m){
    if(!m) return '';
    var f = m.frequency;
    var label = f==='daily' ? 'Daily' : f==='weekly' ? 'Weekly' : (m.date ? m.date : 'On date');
    var times = m.timesPerDay ? (' \u00b7 '+m.timesPerDay+'x/day') : '';
    var rec = m.recurring ? ' \u00b7 recurring' : '';
    return label+times+rec;
  }

  function nextBirthdayInfo(dateStr){
    if(!dateStr) return null;
    var parts = dateStr.split('-').map(Number);
    var birthYear = parts[0], month = parts[1], day = parts[2];
    var today = dateOnly(new Date());
    var year = today.getFullYear();
    var next = new Date(year, month-1, day);
    if(next < today){ next = new Date(year+1, month-1, day); }
    var days = Math.round((next - today) / 86400000);
    var turningAge = next.getFullYear() - birthYear;
    return { days: days, turningAge: turningAge };
  }

  function bdayLabel(dateStr){
    var info = nextBirthdayInfo(dateStr);
    if(!info) return '';
    var when = info.days===0 ? 'Today!' : info.days===1 ? 'Tomorrow' : ('in '+info.days+' days');
    return when + ' \u00b7 turns ' + info.turningAge;
  }

  function shopLabel(s){
    if(!s) return '';
    var qty = s.qty!=null && s.qty!=='' ? s.qty : 1;
    var price = s.price!=null && s.price!=='' ? s.price : null;
    var t = 'Qty '+qty;
    if(price!==null){ t += ' \u00b7 '+ (qty*price).toFixed(2); }
    return t;
  }

  function sortTasks(list){
    return list.slice().sort(function(a,b){
      var doneA = isEffectivelyDone(a), doneB = isEffectivelyDone(b);
      if(doneA!==doneB) return doneA?1:-1;
      var occA = (a.type==='task') ? occurrenceDateStr(a) : a.dueDate;
      var occB = (b.type==='task') ? occurrenceDateStr(b) : b.dueDate;
      var da = occA ? daysUntil(occA) : null;
      var db = occB ? daysUntil(occB) : null;
      if(da===null && db===null) return 0;
      if(da===null) return 1;
      if(db===null) return -1;
      return da-db;
    });
  }

  function renderTaskNode(t){

    html += renderTypeTag(t);

      (t.important ? '<svg viewBox="0 0 24 24" fill="#E0A030" stroke="#E0A030" stroke-width="1.2"><path d="M12 2l2.9 6.3 6.9.7-5.2 4.7 1.5 6.8L12 17l-6.1 3.5 1.5-6.8-5.2-4.7 6.9-.7z"/></svg>' :
      '<svg viewBox="0 0 24 24" fill="none" stroke="#C7C4BC" stroke-width="1.3"><path d="M12 2l2.9 6.3 6.9.7-5.2 4.7 1.5 6.8L12 17l-6.1 3.5 1.5-6.8-5.2-4.7 6.9-.7z"/></svg>')+'</button>';
    html += '</div>';
    html += '<div class="meta-row">';
    if(t.type==='task') html += taskBadgesHtml(t);
    if(t.type==='shopping') html += '<span class="badge shop">'+shopLabel(t.shopping)+'</span>';
    if(t.type==='medicine') html += '<span class="badge med">'+medLabel(t.medicine)+'</span>';
    if(t.type==='birthday') html += '<span class="badge bday">'+bdayLabel(t.birthday && t.birthday.date)+'</span>';
    html += '</div></div>';

    }
    html += '<button class="iconbtn" data-action="delete-task" data-id="'+t.id+'" title="Delete">'+
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 7h16M9 7V5a1 1 0 011-1h4a1 1 0 011 1v2M6 7l1 13a1 1 0 001 1h8a1 1 0 001-1l1-13"/></svg></button>';
    html += '</div></div>';

    if(openAddFor === t.id) html += renderInlineForm(t.profileId, t.id);
    if(hasChildren && !isCollapsed){
      html += '<div class="children">'+children.map(renderTaskNode).join('')+'</div>';
    }
    html += '</div>';
    return html;
  }

  function taskPath(t){
    var parts=[], cur=t, guard=0;
    while(cur && cur.parentId && guard<10){
      var parent = state.tasks.find(function(x){return x.id===cur.parentId;});
      if(!parent) break;
      parts.unshift(parent.title);
      cur = parent; guard++;
    }
    return parts.join(' \u203a ');
  }

  function parseDateStr(s){ if(!s) return null; var p=s.split('-').map(Number); return new Date(p[0],p[1]-1,p[2]); }

  function inReportRange(dateStr, range){
    if(range==='all') return true;
    var d = parseDateStr(dateStr);
    if(!d) return false;
    var today = dateOnly(new Date());
    if(range==='week'){
      var day = today.getDay();
      var monday = new Date(today); monday.setDate(today.getDate() - ((day+6)%7));
      var sunday = new Date(monday); sunday.setDate(monday.getDate()+6);
      return d>=monday && d<=sunday;
    }
    if(range==='month'){
      return d.getFullYear()===today.getFullYear() && d.getMonth()===today.getMonth();
    }
    return true;
  }

  function exportData(){
    var blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    var d = new Date();
    a.href = url;
    a.download = 'logbook-backup-'+d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+'.json';
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);

  function importData(file){
    var reader = new FileReader();
    reader.onload = function(e){
      try{
        var parsed = JSON.parse(e.target.result);
        if(parsed.profiles && parsed.tasks){
          state.profiles = parsed.profiles;
          state.tasks = parsed.tasks;
          state.apps = parsed.apps || [];
          state.currentProfile = parsed.currentProfile || (parsed.profiles[0] && parsed.profiles[0].id) || 'home';
          save();
        } else {
          alert('This file doesn\'t look like a Logbook backup.');
        }
      }catch(err){
        alert('Could not read that file.');
      }
    };
    reader.readAsText(file);
  }

  document.getElementById('content').addEventListener('click', function(e){
    var btn = e.target.closest('[data-action]');
    if(!btn) return;
    var action = btn.getAttribute('data-action');
    var id = btn.getAttribute('data-id');

    if(action==='toggle-done'){ toggleDone(id); }
    else if(action==='toggle-important'){ toggleImportant(id); }
    else if(action==='delete-task'){ deleteTask(id); }
    else if(action==='toggle-collapse'){ collapsed[id]=!collapsed[id]; renderAll(); }
    else if(action==='report-range'){ reportRange = btn.getAttribute('data-range'); renderAll(); }
    else if(action==='toggle-subadd'){ openAddFor = (openAddFor===id)?null:id; addType='task'; medFreq='daily'; taskFreq='duedate'; draft=defaultDraft(); renderAll(); }
    else if(action==='cancel-add'){ openAddFor=null; draft=defaultDraft(); renderAll(); }
    else if(action==='set-type'){ addType = btn.getAttribute('data-type'); renderAll(); }
    else if(action==='toggle-weekday'){
      var day = parseInt(btn.getAttribute('data-day'),10);
      var idx = draft.taskWeekdays.indexOf(day);
      if(idx===-1) draft.taskWeekdays.push(day); else draft.taskWeekdays.splice(idx,1);
      renderAll(); refocusForm();
    }
    else if(action==='toggle-monthday'){
      var mday2 = parseInt(btn.getAttribute('data-day'),10);
      var midx = draft.taskMonthDays.indexOf(mday2);
      if(midx===-1) draft.taskMonthDays.push(mday2); else draft.taskMonthDays.splice(midx,1);
      renderAll(); refocusForm();
    }
    else if(action==='save-add'){
      var container = btn.closest('.form');
      var title = container.querySelector('.f-title').value.trim();
      if(!title) return;
      var profileId = btn.getAttribute('data-profile');
      var parentId = (id==='top') ? null : id;
      var data = { title: title, type: addType };

      if(addType==='task'){
        var tfreq = container.querySelector('.f-taskfreq').value;
        data.recurMode = tfreq;
        data.important = container.querySelector('.f-important').checked;
        if(tfreq==='duedate'){
          data.dueDate = container.querySelector('.f-date').value || null;
        } else if(tfreq==='weekly'){
          if(draft.taskWeekdays.length===0){ alert('Pick at least one day of the week.'); return; }
          data.recurWeekdays = draft.taskWeekdays.slice();
          data.dueDate = null;
          data.recurCompletions = {};
        } else if(tfreq==='monthly'){
          if(draft.taskMonthDays.length===0){ alert('Pick at least one date of the month.'); return; }
          data.recurMonthDays = draft.taskMonthDays.slice();
          data.dueDate = null;
          data.recurCompletions = {};
        } else if(tfreq==='daily'){
          data.dueDate = null;
          data.recurCompletions = {};
        }
      } else if(addType==='shopping'){
        var qty = parseFloat(container.querySelector('.f-qty').value) || 1;
        var price = parseFloat(container.querySelector('.f-price').value);
        data.shopping = { qty: qty, price: isNaN(price) ? null : price };
      } else if(addType==='medicine'){
        var freq = container.querySelector('.f-freq').value;
        var medDate = null;
        if(freq==='date'){ var dEl = container.querySelector('.f-meddate'); medDate = dEl ? dEl.value : null; }
        var times = parseInt(container.querySelector('.f-times').value,10) || 1;
        var recurring = container.querySelector('.f-recurring').checked;
        data.medicine = { frequency: freq, date: medDate, timesPerDay: times, recurring: recurring };
        if(freq==='date' && medDate) data.dueDate = medDate;
      } else if(addType==='birthday'){
        var bdate = container.querySelector('.f-bday').value;
        if(!bdate) return;
        data.birthday = { date: bdate };
      }

      addTask(profileId, parentId, data);
      openAddFor = null;
      draft = defaultDraft();
      save();
    }
  });

  // ---- simple password lock (client-side deterrent, not real security) ----
  var PW_KEY = 'logbook_pw_hash_v1';

  function simpleHash(str){
    var hash = 0;
    for(var i=0;i<str.length;i++){
      hash = ((hash<<5)-hash) + str.charCodeAt(i);
      hash |= 0;
    }
    return 'h'+hash.toString(36);
  }

  function getStoredHash(){
    if(!storageOK) return null;
    try{ return window.localStorage.getItem(PW_KEY); }catch(e){ return null; }
  }
  function setStoredHash(h){
    if(!storageOK) return;
    try{ window.localStorage.setItem(PW_KEY, h); }catch(e){}
  }

  function showApp(){
    document.getElementById('lockscreen').classList.add('hidden');
    document.getElementById('app').style.display = '';
    load();
  }

  function initLock(){
    var existing = getStoredHash();
    var titleEl = document.getElementById('lockTitle');
    var subEl = document.getElementById('lockSub');
    var input1 = document.getElementById('lockInput');
    var input2 = document.getElementById('lockInput2');
    var errEl = document.getElementById('lockError');
    var submitBtn = document.getElementById('lockSubmit');
    var forgotEl = document.getElementById('lockForgot');
    var isSetupMode = !existing;

    if(!storageOK){
      // no storage available at all (e.g. some restricted preview contexts) - skip lock, nothing to protect anyway
      showApp();
      return;
    }

    if(isSetupMode){
      titleEl.textContent = 'Set a password';
      subEl.textContent = 'Protects this app on this device';
      input2.style.display = '';
      submitBtn.textContent = 'Set password';
      forgotEl.style.display = 'none';
    } else {
      titleEl.textContent = 'Logbook';
      subEl.textContent = 'Enter your password';
      input2.style.display = 'none';
      submitBtn.textContent = 'Unlock';
      forgotEl.style.display = '';
    }

    function attempt(){
      errEl.textContent = '';
      var pw = input1.value;
      if(isSetupMode){
        var pw2 = input2.value;
        if(!pw || pw.length<4){ errEl.textContent = 'Use at least 4 characters.'; return; }
        if(pw!==pw2){ errEl.textContent = 'Passwords don\'t match.'; return; }
        setStoredHash(simpleHash(pw));
        showApp();
      } else {
        if(simpleHash(pw) !== existing){ errEl.textContent = 'Wrong password.'; input1.value=''; input1.focus(); return; }
        showApp();
      }
    }

    submitBtn.onclick = attempt;
    [input1, input2].forEach(function(el){
      el.onkeydown = function(e){ if(e.key==='Enter') attempt(); };
    });
    input1.focus();

    forgotEl.onclick = function(e){
      if(e.target.getAttribute('data-action')!=='lock-reset') return;
      if(confirm('This clears your password AND all app data on this device (profiles, tasks, everything). This can\'t be undone. Continue?')){
        try{ window.localStorage.clear(); }catch(err){}
        window.location.reload();
      }
    };
  }

  initLock();
})();
</script>
</body>
</html>
